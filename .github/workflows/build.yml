name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      config_path: config
      archive_name: firmware
      build_matrix: |
        include:
          - board: adv360_pro
            shield: adv360_pro_left
          - board: adv360_pro
            shield: adv360_pro_right
          - board: glove80_lh
            shield: glove80_lh
          - board: glove80_rh
            shield: glove80_rh
